<div class="min-h-screen bg-surface pb-20 md:pb-8 overflow-x-hidden">
  <div class="max-w-2xl mx-auto">

    <!-- Header -->
    <div class="relative bg-gradient-to-r from-primary to-[#6e9fff] px-6 py-8 md:rounded-b-3xl overflow-hidden z-0">
      <div class="relative z-10">
        <h1 class="text-3xl font-extrabold text-white mb-2 font-manrope">
          Menu
        </h1>
        <p class="text-white/90 font-inter">
          Acesse todas as funcionalidades do FePF
        </p>
      </div>

      <!-- Background decorativo -->
      <div class="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full blur-3xl -mr-10 -mt-10"></div>
    </div>

    <!-- Quick Actions -->
    <div class="px-6 -mt-6 mb-6 relative z-10">
      <div class="bg-white rounded-2xl shadow-lg p-4">
        <h2 class="text-sm font-bold text-gray-600 mb-3 font-inter uppercase tracking-wide">
          Ações Rápidas
        </h2>
        <div class="grid grid-cols-3 gap-2">
          <a
            *ngFor="let action of quickActions"
            [routerLink]="action.route"
            class="flex flex-col items-center gap-2 p-3 rounded-xl hover:bg-surface transition-colors">
            <div
              class="w-12 h-12 rounded-xl flex items-center justify-center"
              [style.background-color]="action.color + '15'"
              [style.color]="action.color">
              <i [class]="'ri-' + action.icon + '-circle-line text-2xl'"></i>
            </div>
            <span class="text-xs font-medium text-center font-inter text-gray-700">
              {{ action.title }}
            </span>
          </a>
        </div>
      </div>
    </div>

    <!-- Main Menu Items -->
    <div class="px-6 space-y-4">
      <h2 class="text-sm font-bold text-gray-600 font-inter uppercase tracking-wide">
        Gestão Financeira
      </h2>

      <a
        *ngFor="let item of menuItems"
        [routerLink]="item.route"
        class="block bg-white rounded-2xl shadow-sm hover:shadow-md transition-all overflow-hidden border border-gray-100 active:scale-[0.98]">
        <div class="p-5 flex items-center gap-4">
          <!-- Icon -->
          <div
            class="flex-shrink-0 w-14 h-14 rounded-xl flex items-center justify-center"
            [style.background-color]="item.bgColor">
            <i
              [class]="'ri-' + item.icon + '-line text-2xl'"
              [style.color]="item.color">
            </i>
          </div>

          <!-- Content -->
          <div class="flex-1 min-w-0">
            <h3 class="font-bold text-lg text-on-surface font-manrope mb-0.5">
              {{ item.title }}
            </h3>
            <p class="text-sm text-gray-600 font-inter line-clamp-1">
              {{ item.description }}
            </p>
          </div>

          <!-- Arrow -->
          <div class="flex-shrink-0">
            <i class="ri-arrow-right-s-line text-2xl text-gray-400"></i>
          </div>
        </div>
      </a>
    </div>

    <!-- Additional Options -->
    <div class="px-6 mt-8 space-y-4">
      <h2 class="text-sm font-bold text-gray-600 font-inter uppercase tracking-wide">
        Outros
      </h2>

      <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-100">
        <a
          routerLink="/dashboard"
          class="flex items-center justify-between px-5 py-4 hover:bg-surface transition-colors border-b border-gray-100">
          <div class="flex items-center gap-3">
            <i class="ri-home-line text-xl text-gray-600"></i>
            <span class="font-medium font-inter text-on-surface">Dashboard</span>
          </div>
          <i class="ri-arrow-right-s-line text-xl text-gray-400"></i>
        </a>

        <!-- <button
          class="w-full flex items-center justify-between px-5 py-4 hover:bg-surface transition-colors">
          <div class="flex items-center gap-3">
            <i class="ri-settings-3-line text-xl text-gray-600"></i>
            <span class="font-medium font-inter text-on-surface">Configurações</span>
          </div>
          <i class="ri-arrow-right-s-line text-xl text-gray-400"></i>
        </button> -->
      </div>
    </div>

    <!-- App Info -->
    <div class="px-6 mt-8 pb-4">
      <div class="text-center text-sm text-gray-500 font-inter space-y-1">
        <div class="flex items-center justify-center gap-2">
          <img src="/logo.png" alt="FePF Logo" class="w-6 h-6">
          <span class="font-bold">FePF</span>
        </div>
        <p class="text-xs">Versão 1.0.0</p>
      </div>
    </div>

  </div>
</div>
