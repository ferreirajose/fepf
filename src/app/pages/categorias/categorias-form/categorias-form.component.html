<div class="min-h-screen p-6">
  <div class="max-w-3xl mx-auto">
    <!-- Header -->
    <div class="mb-8">
      <h1 class="text-4xl font-manrope font-bold text-on-surface mb-2">
        {{ isEdicao() ? 'Editar Categoria' : 'Nova Categoria' }}
      </h1>
      <p class="text-gray-600 font-inter">Preencha os dados da categoria</p>
    </div>

    <!-- Formulário -->
    <form [formGroup]="form" (ngSubmit)="salvar()" class="bg-white rounded-lg p-8 shadow-sm">
      <!-- Nome -->
      <div class="mb-6">
        <label for="nome" class="block text-sm font-inter font-medium text-on-surface mb-2">
          Nome da Categoria *
        </label>
        <input
          id="nome"
          type="text"
          formControlName="nome"
          placeholder="Ex: Alimentação"
          class="w-full px-4 py-3 bg-surface border-0 rounded font-inter focus:ring-2 focus:ring-primary outline-none"
          [ngClass]="form.get('nome')?.invalid && form.get('nome')?.touched ? 'ring-2 ring-red-500' : ''"
        />
        <p *ngIf="form.get('nome')?.invalid && form.get('nome')?.touched"
           class="text-red-500 text-sm mt-1 font-inter">
          O nome deve ter no mínimo 3 caracteres
        </p>
      </div>

      <!-- Cor -->
      <div class="mb-6">
        <label class="block text-sm font-inter font-medium text-on-surface mb-2">
          Cor *
        </label>
        <div class="grid grid-cols-10 gap-2">
          <button
            type="button"
            *ngFor="let cor of cores"
            (click)="selecionarCor(cor)"
            [style.background-color]="cor"
            class="w-10 h-10 rounded cursor-pointer hover:scale-110 transition-transform"
            [ngClass]="form.get('cor')?.value === cor ? 'ring-2 ring-primary ring-offset-2' : ''"
          ></button>
        </div>
        <input type="hidden" formControlName="cor" />
      </div>

      <!-- Ativo -->
      <div class="mb-8">
        <label class="flex items-center cursor-pointer">
          <input
            type="checkbox"
            formControlName="ativo"
            class="w-5 h-5 text-primary bg-surface border-gray-300 rounded focus:ring-primary"
          />
          <span class="ml-2 text-sm font-inter text-on-surface">Categoria ativa</span>
        </label>
      </div>

      <!-- Ações -->
      <div class="flex gap-4">
        <button
          type="submit"
          [disabled]="form.invalid"
          class="flex-1 bg-primary text-white px-6 py-3 rounded font-inter font-medium hover:bg-[#004ca6] transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
          <i-feather [name]="isEdicao() ? 'check' : 'save'" class="w-5 h-5"></i-feather>
          <span>{{ isEdicao() ? 'Atualizar' : 'Criar' }} Categoria</span>
        </button>
        <button
          type="button"
          (click)="cancelar()"
          class="flex-1 bg-gray-100 text-gray-700 px-6 py-3 rounded font-inter font-medium hover:bg-gray-200 transition-colors flex items-center justify-center gap-2">
          <i-feather name="x" class="w-5 h-5"></i-feather>
          <span>Cancelar</span>
        </button>
      </div>
    </form>
  </div>
</div>
