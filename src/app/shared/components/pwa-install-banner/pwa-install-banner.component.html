<!-- Banner para Android/Chrome -->
<div
  *ngIf="showInstallPrompt() && !isIOS()"
  class="fixed bottom-0 left-0 right-0 z-50 mx-auto max-w-md mb-20 md:mb-4 px-4 animate-slide-up">
  <div class="bg-gradient-to-r from-primary to-[#6e9fff] rounded-2xl shadow-2xl p-5 text-white relative overflow-hidden">
    <!-- Background decorativo -->
    <div class="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full blur-3xl -mr-10 -mt-10"></div>
    <div class="absolute bottom-0 left-0 w-24 h-24 bg-white/10 rounded-full blur-2xl -ml-10 -mb-10"></div>

    <div class="relative z-10 flex items-start gap-4">
      <!-- Logo -->
      <div class="flex-shrink-0 w-14 h-14 bg-white rounded-2xl p-2 shadow-lg flex items-center justify-center">
        <img src="/logo.png" alt="FePF Logo" class="w-full h-full object-contain">
      </div>

      <!-- Conteúdo -->
      <div class="flex-1">
        <h3 class="font-bold text-lg mb-1 font-manrope">
          Instale o FePF
        </h3>
        <p class="text-white/90 text-sm mb-3 font-inter">
          Acesso rápido, trabalhe offline e receba notificações
        </p>

        <div class="flex gap-2">
          <button
            (click)="installPWA()"
            class="flex-1 bg-white text-primary px-4 py-2.5 rounded-xl font-bold text-sm hover:bg-blue-50 transition-colors shadow-lg font-inter">
            <i class="ri-download-line mr-1"></i>
            Instalar
          </button>
          <button
            (click)="dismiss()"
            class="px-4 py-2.5 text-white/90 hover:text-white transition-colors font-inter text-sm">
            Agora não
          </button>
        </div>
      </div>

      <!-- Botão fechar -->
      <button
        (click)="dismiss()"
        class="flex-shrink-0 w-8 h-8 flex items-center justify-center text-white/70 hover:text-white transition-colors">
        <i class="ri-close-line text-xl"></i>
      </button>
    </div>
  </div>
</div>

<!-- Banner para iOS -->
<div
  *ngIf="showInstallPrompt() && isIOS()"
  class="fixed bottom-0 left-0 right-0 z-50 mx-auto max-w-md mb-20 md:mb-4 px-4 animate-slide-up">
  <div class="bg-gradient-to-r from-primary to-[#6e9fff] rounded-2xl shadow-2xl p-5 text-white relative overflow-hidden">
    <!-- Background decorativo -->
    <div class="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full blur-3xl -mr-10 -mt-10"></div>
    <div class="absolute bottom-0 left-0 w-24 h-24 bg-white/10 rounded-full blur-2xl -ml-10 -mb-10"></div>

    <div class="relative z-10">
      <div class="flex items-start gap-4 mb-3">
        <!-- Logo -->
        <div class="flex-shrink-0 w-14 h-14 bg-white rounded-2xl p-2 shadow-lg flex items-center justify-center">
          <img src="/logo.png" alt="FePF Logo" class="w-full h-full object-contain">
        </div>

        <!-- Título -->
        <div class="flex-1">
          <h3 class="font-bold text-lg mb-1 font-manrope">
            Adicione à Tela Inicial
          </h3>
          <p class="text-white/90 text-sm font-inter">
            Instale este app na tela inicial para acesso rápido
          </p>
        </div>

        <!-- Botão fechar -->
        <button
          (click)="dismiss()"
          class="flex-shrink-0 w-8 h-8 flex items-center justify-center text-white/70 hover:text-white transition-colors">
          <i class="ri-close-line text-xl"></i>
        </button>
      </div>

      <!-- Instruções iOS -->
      <div class="bg-white/10 backdrop-blur-sm rounded-xl p-4 space-y-2">
        <div class="flex items-start gap-3">
          <div class="flex-shrink-0 w-8 h-8 bg-white/20 rounded-lg flex items-center justify-center">
            <span class="text-lg">1</span>
          </div>
          <p class="text-sm text-white/95 font-inter pt-1">
            Toque no ícone de compartilhar
            <i class="ri-share-line mx-1 align-middle"></i>
            na barra de ferramentas
          </p>
        </div>
        <div class="flex items-start gap-3">
          <div class="flex-shrink-0 w-8 h-8 bg-white/20 rounded-lg flex items-center justify-center">
            <span class="text-lg">2</span>
          </div>
          <p class="text-sm text-white/95 font-inter pt-1">
            Role e toque em "Adicionar à Tela de Início"
            <i class="ri-add-box-line mx-1 align-middle"></i>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
