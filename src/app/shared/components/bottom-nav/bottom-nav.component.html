<nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-lg z-40 pb-safe">
  <div class="flex items-center justify-around h-16">
    <a
      *ngFor="let item of navItems"
      [routerLink]="item.route"
      routerLinkActive="text-primary bg-primary/5"
      [routerLinkActiveOptions]="{exact: false}"
      class="flex-1 flex flex-col items-center justify-center gap-1 py-2 px-3 transition-colors hover:text-primary group">
      <i [class]="'ri-' + item.icon + '-line text-xl'"></i>
      <span class="text-[10px] font-medium font-inter">{{ item.label }}</span>
    </a>
  </div>
</nav>
